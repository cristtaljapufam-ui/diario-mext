<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Diário de Estudos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img src="sakura.webp" class="sakura-deco sakura-topo" alt="Sakura">
    <img src="sakura.webp" class="sakura-deco sakura-baixo" alt="Sakura">

    <main class="container">
        <nav class="menu-diario">
            <a href="index.html">Início</a>
            <a href="diario.html">Diário de Estudos</a>
        </nav>

        <h2>Meus Estudos</h2>
        <ul id="estudos-container">Carregando dados...</ul>

        <div style="margin-top: 30px;">
            <a href="admin.html" style="padding: 10px 20px; background: #d32f2f; color: white; text-decoration: none; border-radius: 5px;">+ Novo Registro</a>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://doakqltmqmsmwjdupssk.supabase.co";
        const SUPABASE_KEY = "sb_publishable_sKx9ckqHw1JQd4xVnJmGtQ_zHCFoXgB";

        fetch(`${SUPABASE_URL}/rest/v1/estudos?select=*`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        })
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('estudos-container');
            container.innerHTML = ''; 
            data.forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `<strong>${item.data}</strong>: ${item.conteudo} (${item.nivel})`;
                container.appendChild(li);
            });
        })
        .catch(err => {
            document.getElementById('estudos-container').innerHTML = "Erro ao carregar dados.";
            console.error(err);
        });
    </script>
</body>
</html>
