<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Diário de Estudos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <nav class="menu-diario">
            <a href="index.html">Início</a>
            <a href="estudos.html">Diário de Estudos</a>
        </nav>

        <h2>Meus Estudos</h2>
        <ul id="estudos-container">Carregando dados...</ul>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const SUPABASE_URL = "https://doakqltmqmsmwjdupssk.supabase.co";
            const SUPABASE_KEY = "sb_publishable_sKx9ckqHw1JQd4xVnJmGtQ_zHCFoXgB";
            const container = document.getElementById('estudos-container');

            fetch(`${SUPABASE_URL}/rest/v1/estudos?select=*`, {
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json'
                }
            })
            .then(res => res.json())
            .then(data => {
                container.innerHTML = '';
                if (!data || data.length === 0) {
                    container.innerHTML = '<li>Nenhum estudo encontrado.</li>';
                    return;
                }
                data.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `<strong>${item.data}</strong>: ${item.conteudo}`;
                    container.appendChild(li);
                });
            })
            .catch(err => {
                console.error(err);
                container.innerHTML = "<li>Erro ao carregar dados.</li>";
            });
        });
    </script>
</body>
</html>
