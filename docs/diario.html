<script>
    const SUPABASE_URL = "https://doakqltmqmsmwjdupssk.supabase.co";
    const SUPABASE_KEY = "sb_publishable_sKx9ckqHw1JQd4xVnJmGtQ_zHCFoXgB";

    fetch(`${SUPABASE_URL}/rest/v1/estudos?select=*`, {
        headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
        }
    })
    .then(res => res.json())
    .then(data => {
        const container = document.getElementById('estudos-container');
        container.innerHTML = ''; 
        data.forEach(item => {
            const li = document.createElement('li');
            li.style.marginBottom = "20px";
            li.style.borderBottom = "1px solid #ccc";
            li.style.paddingBottom = "10px";
            
            // Aqui estamos montando como cada item aparece na tela
            li.innerHTML = `
                <strong>Data:</strong> ${item.data}<br>
                <strong>Conteúdo:</strong> ${item.conteudo}<br>
                <strong>Exemplo:</strong> ${item.exemplo || 'N/A'}<br>
                <strong>Tradução:</strong> ${item.traducao || 'N/A'}<br>
                <strong>Kanjis:</strong> ${item.kanjis_aprendidos || 'N/A'}<br>
                ${item.foto_url ? `<img src="${item.foto_url}" style="max-width: 200px; display: block; margin-top: 5px;">` : ''}
            `;
            container.appendChild(li);
        });
    })
    .catch(err => {
        document.getElementById('estudos-container').innerHTML = "Erro ao carregar dados.";
        console.error(err);
    });
</script>
