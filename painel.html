<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo MEXT</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #form-container { display: none; margin-top: 20px; width: 300px; }
        input, button { width: 100%; margin: 5px 0; padding: 8px; }
    </style>
</head>
<body>
    <div id="login-box">
        <h2>Acesso Restrito</h2>
        <input type="password" id="senha" placeholder="Digite a senha">
        <button id="btnEntrar">Entrar</button>
    </div>

    <div id="form-container">
        <h2>Cadastrar Estudo</h2>
        <input type="date" id="data">
        <input type="text" id="conteudo" placeholder="Conteúdo">
        <button onclick="alert('Funciona!')">Testar</button>
    </div>

    <script>
        // Tenta rodar a lógica apenas quando a página carregar totalmente
        document.addEventListener('DOMContentLoaded', function() {
            const btnEntrar = document.getElementById('btnEntrar');
            
            btnEntrar.addEventListener('click', function() {
                const senha = document.getElementById('senha').value;
                console.log("Tentando entrar com:", senha);
                
                if (senha === "92053761") {
                    document.getElementById('login-box').style.display = 'none';
                    document.getElementById('form-container').style.display = 'block';
                } else {
                    alert("Senha incorreta!");
                }
            });
        });
    </script>
</body>
</html>
