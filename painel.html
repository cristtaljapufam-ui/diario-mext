<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo MEXT</title>
    <!-- Script corrigido -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #form-container { display: none; margin-top: 20px; width: 300px; }
        input, button { width: 100%; margin: 5px 0; padding: 8px; }
    </style>
</head>
<body>
    <div id="login-box">
        <h2>Acesso Restrito</h2>
        <input type="password" id="senha" placeholder="Digite a senha">
        <button onclick="verificarSenha()">Entrar</button>
    </div>

    <div id="form-container">
        <h2>Cadastrar Estudo</h2>
        <input type="date" id="data">
        <input type="text" id="conteudo" placeholder="Conteúdo">
        <input type="text" id="exemplo" placeholder="Exemplo">
        <input type="text" id="traducao" placeholder="Tradução">
        <input type="text" id="kanjis" placeholder="Kanjis Aprendidos">
        <input type="file" id="fileInput" accept="image/*">
        <button onclick="salvarEstudo()">Salvar Registro</button>
    </div>

    <script>
        // Configuração corrigida
        const SUPABASE_URL = "https://doakqltmqmsmwjdupssk.supabase.co";
        const SUPABASE_KEY = "sb_publishable_sKx9ckqHw1JQd4xVnJmGtQ_zHCFoXgB";
        
        // CORREÇÃO: O objeto global é 'supabase', não 'supabase.supabase'
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function verificarSenha() {
            const senha = document.getElementById('senha').value;
            if (senha === "92053761") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('form-container').style.display = 'block';
            } else {
                alert("Senha incorreta!");
            }
        }

        async function salvarEstudo() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            let foto_url = "";

            if (file) {
                const fileName = `${Date.now()}_${file.name}`;
                const { error: uploadError } = await supabase.storage
                    .from('estudos')
                    .upload(fileName, file);
                
                if (uploadError) { alert("Erro ao subir foto: " + uploadError.message); return; }
                
                const { data } = supabase.storage.from('estudos').getPublicUrl(fileName);
                foto_url = data.publicUrl;
            }

            const { error } = await supabase.from('estudos').insert([{
                data: document.getElementById('data').value,
                conteudo: document.getElementById('conteudo').value,
                exemplo: document.getElementById('exemplo').value,
                traducao: document.getElementById('traducao').value,
                kanjis_aprendidos: document.getElementById('kanjis').value,
                foto_url: foto_url
            }]);

            if (error) { alert("Erro ao salvar: " + error.message); }
            else { alert("Sucesso!"); window.location.href = "diario.html"; }
        }
    </script>
</body>
</html>
