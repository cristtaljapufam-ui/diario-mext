<html lang="pt-br">

    <title>Painel Administrativo</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #form-container { display: none; } /* Escondido por padrão */

</head>
<body>
    <div id="login-box">
        <h2>Acesso Restrito</h2>
        <input type="password" id="senha" placeholder="Digite a senha">
        <button onclick="verificarSenha()">Entrar</button>
    </div>

    <div id="form-container">
        <h2>Cadastrar Novo Estudo</h2>
        <input type="date" id="data">
        <input type="text" id="conteudo" placeholder="Conteúdo">
        <input type="text" id="nivel" placeholder="Nível">
        <button onclick="salvarEstudo()">Salvar</button>
    </div>

    <script>
        function verificarSenha() {
            const senha = document.getElementById('senha').value;
            if (senha === "92053761") { // Troque por uma senha sua
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('form-container').style.display = 'block';
            } else {
                alert("Senha incorreta!");
            }
        }

    </script>
</body>
</html>
